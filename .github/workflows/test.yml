# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Run tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      AAA_JWT_TOKEN_SECRET_KEY: ${{ secrets.AAA_JWT_TOKEN_SECRET_KEY || 'ci_jwt_secret_key' }}
      AAA_REDIS_PASSWORD: ${{ secrets.AAA_REDIS_PASSWORD || 'ci_redis_password' }}

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        redis:
          - "7.2"

    steps:
    - uses: actions/checkout@v4
    - uses: shogo82148/actions-setup-redis@81c3559f3be13c0fead88f562d48fa3a62e5fc93 # v1.52.1
      with:
        auto-start: true
        redis-version: "7.x"
        redis-conf: "requirepass ${{ env.AAA_REDIS_PASSWORD }}"
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.3
    - run: redis-cli -a "${AAA_REDIS_PASSWORD}" ping
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - run: pnpm install --no-frozen-lockfile
    # - run: apt install redis-tools
    # - run: ./wait-for-redis.sh localhost:6379
    - run: wget https://github.com/jwilder/dockerize/releases/download/v0.6.1/dockerize-linux-amd64-v0.6.1.tar.gz && sudo tar -C /usr/local/bin -xzvf dockerize-linux-amd64-v0.6.1.tar.gz && rm dockerize-linux-amd64-v0.6.1.tar.gz
    - run: dockerize -wait tcp://localhost:6379 -timeout 1m
    - name: Run scope-aware monorepo CI
      run: |
        git fetch --unshallow origin main dev || git fetch origin main dev --depth=1000
        CHANGED_FILES="$(git diff --name-only origin/main...HEAD | tr '\n' ' ')"
        npm run ci:monorepo -- $CHANGED_FILES
