openapi: 3.1.0
info:
  title: ANYWhere, ANYHow, ANYTime API
  description: "`REST API` built with `AnyWhere, AnyHow, AnyTime Typescript
    Boilerplate` and `Domain Designer`"
  termsOfService: https://www.xpertminds.dev/terms/
  contact:
    email: apiteam@xpertminds.dev
  license:
    name: Unlicensed
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Xpertminds
  url: http://xpertminds.dev
servers:
  - url: http://localhost:3000/api/1.0.0
tags:
  - name: user
    description: System users
    externalDocs:
      description: Find out more
      url: http://xpertminds.dev
  - name: auth
    description: API access end points
  - name: organization
    description: Tenant organizations
paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Do login
      description: Do login
      operationId: login
      requestBody:
        description: Do login in the system
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLogin"
        required: true
      responses:
        "200":
          description: User did login successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationHeader"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
  /auth/logout:
    post:
      tags:
        - auth
      summary: Do logout
      description: Do logout
      operationId: logout
      requestBody:
        description: Logout of the system
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLogout"
        required: true
      responses:
        "200":
          description: User did logout successfully
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/BooleanStringResult"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
      security:
        - bearerAuth:
            - access_allow
  /auth/updateUserPassword:
    post:
