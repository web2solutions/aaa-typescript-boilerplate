services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aaa-mssql
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: '${AAA_MSSQL_SA_PASSWORD:-change_me_mssql_password}'
    ports:
      - '1433:1433'
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
