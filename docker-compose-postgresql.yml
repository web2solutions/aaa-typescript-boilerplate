services:
  postgresql:
    image: postgres:16
    container_name: aaa-postgresql
    environment:
      POSTGRES_USER: aaa
      POSTGRES_PASSWORD: '${AAA_POSTGRES_PASSWORD:-change_me_postgres_password}'
      POSTGRES_DB: aaa
    ports:
      - '5432:5432'
    volumes:
      - postgresql_data:/var/lib/postgresql/data

volumes:
  postgresql_data:
