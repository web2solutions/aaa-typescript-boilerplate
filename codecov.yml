codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 95%
        threshold: 0%
    patch:
      default:
        target: 95%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "src/modules/Users/interface/api/frameworks/**"
  - "src/interface/HTTP/adapters/**/responses/sendErrorResponse.ts"
